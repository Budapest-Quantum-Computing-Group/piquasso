name: Build SDist and wheels

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '**.hpp'
      - '**/CMakeLists.txt'
      - '.github/workflows/**'

  pull_request:
    paths:
      - '**.cpp'
      - '**.hpp'
      - '**/CMakeLists.txt'
      - '.github/workflows/**'

  release:
    types:
      - published

jobs:
  build_sdist:
    name: Build SDist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build SDist
      run: pipx run build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-sdist
        path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cibw_env_macos: ""
          - os: windows-latest
            cibw_env_macos: ""
          - os: macos-14
            cibw_env_macos: "MACOSX_DEPLOYMENT_TARGET=14.0"
          - os: macos-15-intel
            cibw_env_macos: "MACOSX_DEPLOYMENT_TARGET=15.0"

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        # NOTE: Although all wheels can be built, they are not tested currently.
        # However, a comment is left for someone in the future trying to solve this.
        #
        # Problem:
        # Scipy is distributed as sdist sometimes, because it is not built for every
        # architecture cibuildwheel is able to run tests on. The wheel would contain
        # every library, but an sdist needs to be built on the machine, and it
        # requires openblas for building:
        # https://docs.scipy.org/doc/scipy-1.7.1/reference/building/windows.html#installing-openblas
        # However, yum openblas library is sometimes not registered in pkgconfig on
        # install.
        # Therefore, we would need to create an `openblas.pc` file manually, see
        # https://github.com/scipy/scipy/issues/16308#issuecomment-1339714289
        # But then, there are architectures where openblas is not even distributed.
        # This makes installing scipy for testing a nontrivial task.
        #
        # Undeterred, one could just skip testing these cases. But it would require us
        # going through all the architectures and determine which is easy to test.
        # Since the build identifiers are only parsed with `fnmatch`
        # (see: https://cibuildwheel.pypa.io/en/stable/options/#build-skip),
        # it is also tricky to enable testing only on certain architectures.
        #
        # To make it simple, we build every wheel and skip the tests altogether, and
        # pray that it works. If the wheel does not work, we instruct the user to try
        # installing it from sdist.
        #
        # env:
          # CIBW_TEST_EXTRAS: "tensorflow,jax"
          # CIBW_TEST_REQUIRES: pytest
          ## NOTE: --import-mode=importlib prevents pytest to import piquasso from
          ## directory
          # CIBW_TEST_COMMAND: "pytest -v --import-mode=importlib {project}/tests"
        env:
          # libomp is not pre-installed on GitHub's macOS runners; brew installs it
          # once per platform so CMakeLists.txt can find it at /opt/homebrew/opt/libomp.
          CIBW_BEFORE_ALL_MACOS: "brew install libomp"
          # Install CUDA toolkit inside the manylinux container so CMake's
          # find_package(CUDAToolkit) picks it up and the wheel ships the
          # statically-linked GPU extension alongside the CPU one. Skipped on
          # Alpine (musllinux) where dnf is unavailable and CUDA isn't
          # supported anyway -- CMakeLists.txt drops the GPU extension when
          # CUDAToolkit isn't found.
          CIBW_BEFORE_ALL_LINUX: |
            if [ -f /etc/alpine-release ]; then
                echo "Alpine detected (musllinux); skipping CUDA toolkit install"
                exit 0
            fi
            rpm --import https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/D42D0685.pub &&
            dnf install -y dnf-plugins-core &&
            dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo &&
            dnf clean all &&
            dnf install -y --setopt=install_weak_deps=False cuda-toolkit-12-9 &&
            nvcc --version
          CIBW_ENVIRONMENT_LINUX: >-
            PATH=/usr/local/cuda-12.9/bin:$PATH
            CUDAToolkit_ROOT=/usr/local/cuda-12.9
            CUDA_TOOLKIT_ROOT_DIR=/usr/local/cuda-12.9
          # Build without PEP 517 isolation so CMake's JAX probe sees the
          # jax/jaxlib installed in CIBW_BEFORE_BUILD; otherwise pip's
          # isolated venv hides them and the FFI extension is skipped.
          CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"
          # Hard build deps first; JAX is best-effort so wheels still build
          # where jaxlib has no wheels (*-win32, *musllinux*,
          # cp314*-macosx_x86_64). delvewheel is harmless on non-Windows.
          CIBW_BEFORE_BUILD: pip install scikit-build-core pybind11 delvewheel && (pip install "jax[cpu]>=0.4.31" "jaxlib>=0.4.31" || echo "::warning::JAX wheels unavailable for this target; building without the JAX FFI extension")
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"
          # cp314t-win*: Disable free-threaded Python3.14 builds on Windows
          CIBW_SKIP: cp314t-win*
          CIBW_ENVIRONMENT_MACOS: ${{ matrix.cibw_env_macos }}

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  # See: https://cibuildwheel.pypa.io/en/stable/deliver-to-pypi/
  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
